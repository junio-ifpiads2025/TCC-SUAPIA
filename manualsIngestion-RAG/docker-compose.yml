version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_suapia
    ports:
      - "6333:6333" # API REST
      - "6334:6334" # API gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: unless-stopped
    environment:
      -  ENV_VARIABLE=value