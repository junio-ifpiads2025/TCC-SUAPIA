services:
  waha:
    image: devlikeapro/waha:latest
    platform: linux/amd64
    environment:
      WHATSAPP_HOOK_URL: http://host.docker.internal:8002/webhook
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WHATSAPP_HOOK_EVENTS: message.any
      WAHA_NO_API_KEY: true
      WAHA_DASHBOARD_NO_PASSWORD: true
      WHATSAPP_SWAGGER_NO_PASSWORD: true
    volumes:
      - ./waha_sessions:/app/.sessions
      - ./waha_media:/app/.media
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
  db:
    image: pgvector/pgvector:pg16
    container_name: postgres_vector
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: vetordatabase
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      # Esta linha mapeia o seu arquivo local para a pasta de inicialização do container
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  waha_sessions:
  waha_media:
  pgvector_data:
